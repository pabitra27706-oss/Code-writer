<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeType Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container" id="appContainer">

        <!-- ===== INPUT PANEL ===== -->
        <div class="input-panel" id="inputPanel">
            <div class="logo">
                <span class="logo-icon">⌨️</span>
                <span class="logo-text">CodeType <span class="logo-highlight">Studio</span></span>
            </div>

            <div class="input-group">
                <label for="codeInput">Your Code</label>
                <textarea id="codeInput" placeholder="Paste your code here..." spellcheck="false">function greet(name) {
    const message = `Hello, ${name}!`;
    console.log(message);

    if (name === "World") {
        console.log("Welcome to CodeType Studio!");
        console.log("Create amazing typing animations.");
    }

    return message;
}

// Call the function
const result = greet("World");
console.log(result);</textarea>
            </div>

            <div class="settings-row">
                <div class="input-group half">
                    <label for="languageSelect">Language</label>
                    <select id="languageSelect">
                        <option value="javascript" selected>JavaScript</option>
                        <option value="python">Python</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                        <option value="c">C</option>
                        <option value="csharp">C#</option>
                        <option value="typescript">TypeScript</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="php">PHP</option>
                        <option value="ruby">Ruby</option>
                        <option value="go">Go</option>
                        <option value="rust">Rust</option>
                        <option value="swift">Swift</option>
                        <option value="kotlin">Kotlin</option>
                        <option value="dart">Dart</option>
                        <option value="sql">SQL</option>
                        <option value="bash">Bash</option>
                        <option value="json">JSON</option>
                        <option value="xml">XML</option>
                        <option value="yaml">YAML</option>
                        <option value="markdown">Markdown</option>
                    </select>
                </div>
                <div class="input-group half">
                    <label for="fileNameInput">File Name</label>
                    <input type="text" id="fileNameInput" value="index.js" placeholder="main.py">
                </div>
            </div>

            <div class="input-group">
                <label for="speedSlider">Typing Speed: <span id="speedValue">40</span> chars/sec</label>
                <input type="range" id="speedSlider" min="5" max="200" value="40" step="1">
                <div class="speed-labels"><span>🐢 Slow</span><span>🐇 Fast</span></div>
            </div>

            <div class="input-group">
                <label for="newlineDelay">Newline Pause: <span id="newlineDelayValue">300</span> ms</label>
                <input type="range" id="newlineDelay" min="0" max="1000" value="300" step="50">
                <div class="speed-labels"><span>None</span><span>Long</span></div>
            </div>

            <div class="input-group toggle-group">
                <label class="toggle-label">
                    <input type="checkbox" id="humanizeToggle" checked>
                    <span class="toggle-switch"></span>
                    <span>Humanized Typing</span>
                </label>
            </div>

            <div class="input-group toggle-group">
                <label class="toggle-label">
                    <input type="checkbox" id="soundToggle">
                    <span class="toggle-switch"></span>
                    <span>Keyboard Sound 🔊</span>
                </label>
            </div>

            <!-- Recording Settings -->
            <div class="section-divider"><span>Recording</span></div>

            <div class="settings-row">
                <div class="input-group half">
                    <label for="resolutionSelect">Resolution</label>
                    <select id="resolutionSelect">
                        <option value="1080x1920" selected>1080×1920 (Vertical)</option>
                        <option value="720x1280">720×1280 (Vertical)</option>
                        <option value="1920x1080">1920×1080 (Landscape)</option>
                        <option value="1280x720">1280×720 (Landscape)</option>
                    </select>
                </div>
                <div class="input-group half">
                    <label for="endBufferSlider">End Buffer: <span id="endBufferValue">2</span>s</label>
                    <input type="range" id="endBufferSlider" min="0" max="5" value="2" step="0.5">
                </div>
            </div>

            <!-- Buttons -->
            <div class="control-buttons">
                <button class="btn btn-play" id="btnPlay">
                    <span class="btn-icon" id="playIcon">▶</span>
                    <span id="playText">Play</span>
                </button>
                <button class="btn btn-record" id="btnRecord">
                    <span class="btn-icon" id="recordIcon">⏺</span>
                    <span id="recordText">Record</span>
                </button>
                <button class="btn btn-reset" id="btnReset">
                    <span class="btn-icon">⟲</span>
                    <span>Reset</span>
                </button>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
                <span class="progress-text" id="progressText">0%</span>
            </div>
        </div>

        <!-- ===== OUTPUT PANEL ===== -->
        <div class="output-panel" id="outputPanel">

            <!-- DOM Editor (Play mode) -->
            <div class="editor-window" id="editorWindow">
                <div class="editor-titlebar">
                    <div class="window-dots">
                        <span class="dot dot-red"></span>
                        <span class="dot dot-yellow"></span>
                        <span class="dot dot-green"></span>
                    </div>
                    <div class="window-title" id="windowTitle">CodeType Studio</div>
                    <div class="window-actions">
                        <span class="win-btn">─</span>
                        <span class="win-btn">□</span>
                        <span class="win-btn">×</span>
                    </div>
                </div>
                <div class="editor-tabs">
                    <div class="tab active" id="editorTab">
                        <span class="tab-icon" id="tabIcon">📄</span>
                        <span class="tab-name" id="tabName">index.js</span>
                        <span class="tab-close">×</span>
                    </div>
                </div>
                <div class="editor-body" id="editorBody">
                    <div class="code-area" id="codeArea">
                        <div class="code-line" data-line="1">
                            <span class="line-number">1</span>
                            <span class="line-content"><span class="cursor blink">█</span></span>
                        </div>
                    </div>
                </div>
                <div class="editor-statusbar">
                    <div class="status-left">
                        <span class="status-item" id="statusLanguage">JavaScript</span>
                        <span class="status-item">UTF-8</span>
                    </div>
                    <div class="status-right">
                        <span class="status-item" id="statusPosition">Ln 1, Col 1</span>
                        <span class="status-item">Spaces: 4</span>
                    </div>
                </div>
            </div>

            <!-- Canvas Preview (Record mode) -->
            <div class="canvas-preview" id="canvasPreview"></div>

            <!-- Recording Indicator -->
            <div class="recording-indicator" id="recordingIndicator">
                <span class="rec-dot"></span>
                <span class="rec-label">REC</span>
                <span class="rec-timer" id="recTimer">00:00</span>
            </div>
        </div>
    </div>

    <!-- Download Overlay -->
    <div class="download-overlay" id="downloadOverlay">
        <div class="download-card">
            <div class="download-header">
                <span class="download-icon">🎬</span>
                <h2>Recording Complete!</h2>
            </div>
            <div class="download-preview">
                <video id="previewVideo" controls playsinline></video>
            </div>
            <div class="download-info">
                <span id="downloadSize">—</span>
                <span id="downloadDuration">—</span>
                <span id="downloadResolution">—</span>
            </div>
            <div class="download-actions">
                <button class="btn btn-download" id="btnDownload">
                    <span class="btn-icon">⬇</span>
                    <span>Download Video</span>
                </button>
                <button class="btn btn-close-overlay" id="btnCloseOverlay">
                    <span>Close</span>
                </button>
            </div>
        </div>
    </div>

    <script src="js/highlight-parser.js"></script>
    <script src="js/editor-ui.js"></script>
    <script src="js/typing-engine.js"></script>
    <script src="js/recorder.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
